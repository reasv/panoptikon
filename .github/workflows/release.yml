# Release builds: triggered ONLY by version tags (vX.Y.Z), never per-push.
# Builds Panoptikon Server once per platform, smoke-tests it, reuses that exact
# executable as the Panoptikon Desktop sidecar, builds the platform Desktop
# package and signed Tauri updater payload, and attaches both distributions to
# one release. In parallel, the
# docker job builds the container image, smoke-tests it, and pushes it to
# ghcr.io (it never gates the binary release).

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x86_64
            bin: target/release/panoptikon.exe
            server_asset: panoptikon-server-windows-x86_64.exe
            triple: x86_64-pc-windows-msvc
            desktop_bundle: nsis
            desktop_asset: Panoptikon-Desktop-windows-x86_64.exe
            updater_asset: panoptikon-desktop-updater-windows-x86_64.exe
          - os: ubuntu-latest
            label: linux-x86_64
            bin: target/release/panoptikon
            server_asset: panoptikon-server-linux-x86_64
            triple: x86_64-unknown-linux-gnu
            desktop_bundle: appimage
            desktop_asset: Panoptikon-Desktop-linux-x86_64.AppImage
            updater_asset: panoptikon-desktop-updater-linux-x86_64.AppImage
          - os: macos-latest
            label: macos-aarch64
            bin: target/release/panoptikon
            server_asset: panoptikon-server-macos-aarch64
            triple: aarch64-apple-darwin
            desktop_bundle: dmg
            desktop_asset: Panoptikon-Desktop-macos-aarch64.dmg
            updater_asset: panoptikon-desktop-updater-macos-aarch64.app.tar.gz

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            patchelf libfuse2

      # The standalone bundle vendors node_modules (incl. sharp's native
      # binaries), so it must be built on the same OS/arch it ships for.
      # Next.js does not copy static assets into the standalone output;
      # the bundle is assembled by hand per docs/architecture.md.
      - name: Build UI standalone bundle
        shell: bash
        working-directory: ui
        env:
          BUILD_STANDALONE: "true"
        run: |
          npm ci
          npm run build
          cp -r .next/static .next/standalone/.next/static
          if [ -d public ]; then cp -r public .next/standalone/public; fi
          test -f .next/standalone/server.js

      - name: Build release binary
        shell: bash
        env:
          PANOPTIKON_UI_BUNDLE: ${{ github.workspace }}/ui/.next/standalone
        run: cargo build --release -p panoptikon --features bundled,bundled-ui

      - name: Verify canonical release version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          test "$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "panoptikon") | .version')" = "$version"
          test "$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "panoptikon-desktop") | .version')" = "$version"
          test "$(jq -r .version panoptikon-desktop/src-tauri/tauri.conf.json)" = "$version"
          test "$(jq -r .version ui/package.json)" = "$version"

      # Boot the freshly built artifact in an empty directory through the
      # real no-argument first-run path (auto-setup disabled through a
      # templated value in the shipped config), then exercise it against the
      # fixture DB: migrate, hash-rescan the
      # fixture media so runner-local paths attach to existing items, and
      # assert tag search, thumbnail serving, and file serving all work.
      - name: Smoke test
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          # Read by the template in the shipped default TOML. The smoke test
          # exercises first-run materialization/UI startup without downloading
          # the multi-GB inference environment.
          PANOPTIKON_AUTO_SETUP: "false"
        run: |
          set -euo pipefail
          BIN="$PWD/${{ matrix.bin }}"

          # Run entirely outside the checkout so the binary's CWD-relative
          # resolution (data_folder, runtime/ extraction, python/ and ui/
          # presence checks) and ancestor traversals (.env autoload) can't
          # accidentally pick up repo files - this must behave like a user's
          # empty install dir.
          SMOKE="$RUNNER_TEMP/smoke"
          # Git Bash tools (tar) read the colon in D:\... as a remote-host
          # separator; hand them a POSIX path instead.
          case "$(uname -s)" in MINGW*|MSYS*) SMOKE="$(cygpath -u "$SMOKE")" ;; esac
          mkdir -p "$SMOKE/data"
          HAVE_FIXTURE=0
          if gh release download ci-fixture --pattern fixture.tar.gz --dir "$SMOKE"; then
            tar -xzf "$SMOKE/fixture.tar.gz" -C "$SMOKE/data"
            HAVE_FIXTURE=1
          else
            echo "::warning::ci-fixture release asset not found - running boot-only smoke test (no scan/search/thumbnail assertions)"
          fi

          cd "$SMOKE"
          # No --config: this is the end-user first-run path. The bundled
          # binary must materialize default.toml, listen on 6342, and start
          # its embedded UI without help from a test-only config.
          "$BIN" > gateway.log 2>&1 &
          GW_PID=$!
          trap 'kill $GW_PID 2>/dev/null || true' EXIT

          echo "Waiting for the gateway..."
          for i in $(seq 1 60); do
            curl -fsS http://127.0.0.1:6342/api/client-config > /dev/null 2>&1 && break
            if ! kill -0 $GW_PID 2>/dev/null; then
              echo "gateway process died during startup"; cat gateway.log; exit 1
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:6342/api/client-config > /dev/null

          echo "Waiting for the embedded UI (extraction + node server spawn)..."
          UI_OK=0
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:6342/ 2>/dev/null | grep -qi "<html"; then UI_OK=1; break; fi
            sleep 2
          done
          if [ "$UI_OK" != "1" ]; then
            echo "UI did not serve HTML"; cat gateway.log; exit 1
          fi
          echo "UI serves HTML"

          if [ "$HAVE_FIXTURE" = "1" ]; then
            DB=$(jq -r .db data/manifest.json)
            TAG=$(jq -r .tag data/manifest.json)
            MIN=$(jq -r .count data/manifest.json)

            # Ensure the fixture DB (generated by an older binary) is migrated
            # to this build's schema. Idempotent.
            curl -fsS -X POST "http://127.0.0.1:6342/api/db/create?new_index_db=$DB&new_user_data_db=$DB" > /dev/null

            # Native path of the fixture media dir on this runner. APPEND it to
            # included_folders: replacing would prune the fixture's items
            # before the scan can attach the new paths.
            FILES_DIR="$(cd data/files && (pwd -W 2>/dev/null || pwd))"
            if [ "$RUNNER_OS" = "Windows" ]; then
              FILES_DIR=$(printf '%s' "$FILES_DIR" | tr '/' '\\')
            fi
            curl -fsS "http://127.0.0.1:6342/api/jobs/config?index_db=$DB" > sysconf.json
            jq --arg d "$FILES_DIR" '.included_folders += [$d]' sysconf.json > sysconf_new.json
            curl -fsS -X PUT -H 'Content-Type: application/json' \
              --data @sysconf_new.json "http://127.0.0.1:6342/api/jobs/config?index_db=$DB" > /dev/null
            curl -fsS -X POST "http://127.0.0.1:6342/api/jobs/folders/rescan?index_db=$DB" > /dev/null

            echo "Waiting for the scan (hash-reattaches fixture items to runner paths)..."
            SCAN_OK=0
            for i in $(seq 1 300); do
              N=$(curl -fsS "http://127.0.0.1:6342/api/jobs/queue" | jq --arg db "$DB" '[.queue[] | select(.index_db == $db)] | length')
              if [ "$N" = "0" ]; then SCAN_OK=1; break; fi
              sleep 2
            done
            if [ "$SCAN_OK" != "1" ]; then
              echo "scan jobs did not finish"; cat gateway.log; exit 1
            fi

            echo "Asserting tag search for '$TAG' (fixture baseline: $MIN files)..."
            RESP=$(curl -fsS -X POST -H 'Content-Type: application/json' \
              -d "{\"query\":{\"match_tags\":{\"tags\":[\"$TAG\"],\"match_any\":true}},\"page_size\":5}" \
              "http://127.0.0.1:6342/api/search/pql?index_db=$DB")
            COUNT=$(echo "$RESP" | jq .count)
            echo "tag '$TAG' matched $COUNT files"
            if [ "$COUNT" -lt "$MIN" ]; then
              echo "tag search returned fewer files than the fixture baseline ($COUNT < $MIN)"; exit 1
            fi

            SHA=$(echo "$RESP" | jq -r '.results[0].sha256')
            echo "Asserting thumbnail + file serving for $SHA..."
            curl -fsS -o thumb.bin "http://127.0.0.1:6342/api/items/item/thumbnail?id=$SHA&id_type=sha256&index_db=$DB"
            test -s thumb.bin

            # Serve original bytes via a runner-local path attached by the scan.
            FIRST_FILE=$(ls data/files | head -1)
            if [ "$RUNNER_OS" = "Windows" ]; then SEP='\'; else SEP='/'; fi
            curl -fsS -G -o file.bin \
              --data-urlencode "id=${FILES_DIR}${SEP}${FIRST_FILE}" \
              --data-urlencode "id_type=path" \
              --data-urlencode "index_db=$DB" \
              "http://127.0.0.1:6342/api/items/item/file"
            test -s file.bin
            echo "Fixture assertions passed"
          fi

          kill $GW_PID

      - name: Upload smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-logs-${{ matrix.label }}
          path: ${{ runner.temp }}/smoke/gateway.log
          if-no-files-found: ignore

      - name: Stage Server as the exact Tauri sidecar
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p panoptikon-desktop/src-tauri/binaries
          ext=""; if [ "$RUNNER_OS" = "Windows" ]; then ext=".exe"; fi
          cp "${{ matrix.bin }}" "panoptikon-desktop/src-tauri/binaries/panoptikon-${{ matrix.triple }}${ext}"

      - name: Install pinned Tauri CLI
        run: npm install --global @tauri-apps/cli@2.11.4

      - name: Build signed Desktop package
        working-directory: panoptikon-desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: tauri build --bundles ${{ matrix.desktop_bundle }}

      # Direct-download installers and updater payloads are intentionally
      # separate names, even on platforms where Tauri signs the installer or
      # AppImage bytes directly. latest-desktop.json points only at updater_*.
      - name: Package Server, Desktop, and updater artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "${{ matrix.bin }}" "dist/${{ matrix.server_asset }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${{ matrix.server_asset }}" | awk '{print $1}' > "dist/server-${{ matrix.label }}.sha256"
          else
            shasum -a 256 "dist/${{ matrix.server_asset }}" | awk '{print $1}' > "dist/server-${{ matrix.label }}.sha256"
          fi

          case "$RUNNER_OS" in
            Windows)
              updater=$(find target/release/bundle/nsis -maxdepth 1 -name '*.exe' -print -quit)
              human="$updater"
              ;;
            Linux)
              updater=$(find target/release/bundle/appimage -maxdepth 1 -name '*.AppImage' -print -quit)
              human="$updater"
              ;;
            macOS)
              human=$(find target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)
              updater=$(find target/release/bundle/macos -maxdepth 1 -name '*.app.tar.gz' -print -quit)
              ;;
          esac
          test -n "$human" -a -f "$human"
          test -n "$updater" -a -f "$updater"
          test -s "$updater.sig"
          cp "$human" "dist/${{ matrix.desktop_asset }}"
          cp "$updater" "dist/${{ matrix.updater_asset }}"
          cp "$updater.sig" "dist/${{ matrix.updater_asset }}.sig"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.label }}
          path: dist/*
          if-no-files-found: error

  # Docker image: build, smoke-test the container, push to GHCR. Runs in
  # parallel with the binary matrix and does NOT gate the release publish —
  # a docker-only failure must never block the binary release.
  docker:
    name: Docker image (${{ matrix.accelerator }})
    runs-on: ubuntu-latest
    timeout-minutes: 150
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # CPU image: :latest / :vX.Y.Z — small, runs anywhere.
          - accelerator: cpu
            suffix: ""
          # CUDA image: :latest-cuda / :vX.Y.Z-cuda — the GPU deployment most
          # users run (deploy/docker-compose.cuda.yml). Needs --gpus all at
          # runtime; the image itself builds and boots without a GPU.
          - accelerator: cuda
            suffix: "-cuda"
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      # The CUDA venv (torch + nvidia-* wheels) is several GB; the default
      # hosted-runner free space is too tight for that image build.
      - name: Free disk space
        if: matrix.accelerator == 'cuda'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune -af || true
          df -h

      # linux/amd64 only: the Python inference lockfile excludes
      # linux/aarch64 (no triton wheels), and a QEMU cross-build of the
      # Rust binary + multi-GB venv would multiply CI time for nothing.
      - name: Build image
        run: |
          docker build --build-arg ACCELERATOR=${{ matrix.accelerator }} \
            -t "$IMAGE:${GITHUB_REF_NAME}${{ matrix.suffix }}" \
            -t "$IMAGE:latest${{ matrix.suffix }}" .

      # Same spirit as the binary smoke test: boot the container with the
      # fixture DB mounted as the data volume, then assert the API and the
      # embedded UI respond on both listeners, the public listener is
      # actually restricted, and (when the fixture is available) that
      # scan/search/thumbnail work end to end — the search going through the
      # PUBLIC listener to exercise the restricted ruleset's allow side.
      - name: Smoke test
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SMOKE="$RUNNER_TEMP/docker-smoke"
          mkdir -p "$SMOKE/fixture/files"
          HAVE_FIXTURE=0
          if gh release download ci-fixture --pattern fixture.tar.gz --dir "$SMOKE"; then
            tar -xzf "$SMOKE/fixture.tar.gz" -C "$SMOKE/fixture"
            HAVE_FIXTURE=1
          else
            echo "::warning::ci-fixture release asset not found - running boot-only container smoke test"
          fi
          # The container runs as uid 1000; the runner user is not — the
          # mounted data dir must be writable (scan results, thumbnails).
          chmod -R a+rwX "$SMOKE/fixture"

          docker run -d --name smoke \
            -p 127.0.0.1:6342:6342 -p 127.0.0.1:6339:6339 \
            -v "$SMOKE/fixture:/app/data" \
            "$IMAGE:${GITHUB_REF_NAME}${{ matrix.suffix }}"

          echo "Waiting for the gateway..."
          for i in $(seq 1 60); do
            curl -fsS http://127.0.0.1:6342/api/client-config > /dev/null 2>&1 && break
            if [ "$(docker inspect -f '{{.State.Running}}' smoke)" != "true" ]; then
              echo "container died during startup"; docker logs smoke; exit 1
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:6342/api/client-config > /dev/null

          echo "Waiting for the embedded UI (extraction + node server spawn)..."
          UI_OK=0
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:6342/ 2>/dev/null | grep -qi "<html"; then UI_OK=1; break; fi
            sleep 2
          done
          if [ "$UI_OK" != "1" ]; then
            echo "UI did not serve HTML"; docker logs smoke; exit 1
          fi
          curl -fsS http://127.0.0.1:6339/ | grep -qi "<html"
          echo "UI serves HTML on both listeners"

          echo "Asserting the public listener is restricted..."
          test "$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:6342/api/jobs/queue)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:6339/api/jobs/queue)" = "403"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:6339/api/jobs/config)" = "403"
          curl -fsS http://127.0.0.1:6339/api/client-config > /dev/null
          echo "Policy enforcement OK"

          if [ "$HAVE_FIXTURE" = "1" ]; then
            DB=$(jq -r .db "$SMOKE/fixture/manifest.json")
            TAG=$(jq -r .tag "$SMOKE/fixture/manifest.json")
            MIN=$(jq -r .count "$SMOKE/fixture/manifest.json")

            curl -fsS -X POST "http://127.0.0.1:6342/api/db/create?new_index_db=$DB&new_user_data_db=$DB" > /dev/null

            # Container-side path of the fixture media (the fixture dir IS
            # the data volume). APPEND to included_folders: replacing would
            # prune the fixture's items before the scan can attach the new
            # paths.
            FILES_DIR=/app/data/files
            curl -fsS "http://127.0.0.1:6342/api/jobs/config?index_db=$DB" > "$SMOKE/sysconf.json"
            jq --arg d "$FILES_DIR" '.included_folders += [$d]' "$SMOKE/sysconf.json" > "$SMOKE/sysconf_new.json"
            curl -fsS -X PUT -H 'Content-Type: application/json' \
              --data @"$SMOKE/sysconf_new.json" "http://127.0.0.1:6342/api/jobs/config?index_db=$DB" > /dev/null
            curl -fsS -X POST "http://127.0.0.1:6342/api/jobs/folders/rescan?index_db=$DB" > /dev/null

            echo "Waiting for the scan (hash-reattaches fixture items to container paths)..."
            SCAN_OK=0
            for i in $(seq 1 300); do
              N=$(curl -fsS "http://127.0.0.1:6342/api/jobs/queue" | jq --arg db "$DB" '[.queue[] | select(.index_db == $db)] | length')
              if [ "$N" = "0" ]; then SCAN_OK=1; break; fi
              sleep 2
            done
            if [ "$SCAN_OK" != "1" ]; then
              echo "scan jobs did not finish"; docker logs smoke; exit 1
            fi

            echo "Asserting tag search for '$TAG' via the public listener (baseline: $MIN files)..."
            RESP=$(curl -fsS -X POST -H 'Content-Type: application/json' \
              -d "{\"query\":{\"match_tags\":{\"tags\":[\"$TAG\"],\"match_any\":true}},\"page_size\":5}" \
              "http://127.0.0.1:6339/api/search/pql?index_db=$DB")
            COUNT=$(echo "$RESP" | jq .count)
            echo "tag '$TAG' matched $COUNT files"
            if [ "$COUNT" -lt "$MIN" ]; then
              echo "tag search returned fewer files than the fixture baseline ($COUNT < $MIN)"; exit 1
            fi

            SHA=$(echo "$RESP" | jq -r '.results[0].sha256')
            curl -fsS -o "$SMOKE/thumb.bin" "http://127.0.0.1:6339/api/items/item/thumbnail?id=$SHA&id_type=sha256&index_db=$DB"
            test -s "$SMOKE/thumb.bin"
            echo "Fixture assertions passed"
          fi

      - name: Container logs on failure
        if: failure()
        run: docker logs smoke 2>&1 || true

      - name: Push to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker push "$IMAGE:${GITHUB_REF_NAME}${{ matrix.suffix }}"
          docker push "$IMAGE:latest${{ matrix.suffix }}"

  # Attach all platform artifacts and publish the release in a single job so
  # the three matrix builds don't race to create it. Published directly (not
  # a draft): every job above must already be green, and the notes are
  # generated from the commit history since the previous tag.
  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Validate and extract curated release notes
        shell: bash
        run: |
          set -euo pipefail
          python scripts/changelog.py validate
          python scripts/changelog.py extract \
            --tag "${GITHUB_REF_NAME}" \
            --output dist/release-notes.md
          python scripts/changelog.py feed \
            --repository "${GITHUB_REPOSITORY}" \
            --output dist/changelog.json

      # Build latest.json: the Panoptikon Server updater manifest. The Desktop
      # updater uses the separate Tauri-signature manifest below.
      # stable permalink https://github.com/<repo>/releases/latest/download/
      # latest.json, compares .version to its own, and (later) uses the
      # per-platform url+sha256 to self-update. The download URLs are the
      # immutable per-tag ones; the manifest itself is what's reached by the
      # "latest" permalink.
      - name: Assemble update manifest
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          jq -n \
            --arg version "${TAG#v}" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg notes "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}" \
            --arg win_url "$base/panoptikon-server-windows-x86_64.exe" --arg win_sha "$(cat dist/server-windows-x86_64.sha256)" \
            --arg lin_url "$base/panoptikon-server-linux-x86_64"       --arg lin_sha "$(cat dist/server-linux-x86_64.sha256)" \
            --arg mac_url "$base/panoptikon-server-macos-aarch64"      --arg mac_sha "$(cat dist/server-macos-aarch64.sha256)" \
            '{version: $version, pub_date: $pub_date, notes: $notes, platforms: {
               "windows-x86_64": {url: $win_url, sha256: $win_sha},
               "linux-x86_64":   {url: $lin_url, sha256: $lin_sha},
               "macos-aarch64":  {url: $mac_url, sha256: $mac_sha}}}' > dist/latest.json
          cat dist/latest.json
          # Server hashes are inputs to the manifest, not release assets.
          rm -f dist/server-*.sha256

      - name: Assemble signed Desktop update manifest
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          notes=$(cat dist/release-notes.md)
          jq -n \
            --arg version "${TAG#v}" \
            --arg notes "$notes" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg win_url "$base/panoptikon-desktop-updater-windows-x86_64.exe" \
            --arg win_sig "$(cat dist/panoptikon-desktop-updater-windows-x86_64.exe.sig)" \
            --arg lin_url "$base/panoptikon-desktop-updater-linux-x86_64.AppImage" \
            --arg lin_sig "$(cat dist/panoptikon-desktop-updater-linux-x86_64.AppImage.sig)" \
            --arg mac_url "$base/panoptikon-desktop-updater-macos-aarch64.app.tar.gz" \
            --arg mac_sig "$(cat dist/panoptikon-desktop-updater-macos-aarch64.app.tar.gz.sig)" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: {
              "windows-x86_64": {url: $win_url, signature: $win_sig},
              "linux-x86_64": {url: $lin_url, signature: $lin_sig},
              "darwin-aarch64": {url: $mac_url, signature: $mac_sig}}}' > dist/latest-desktop.json

          # Refuse a partial or crossed product manifest before release.
          jq -e '.platforms | length == 3 and all(.[]; (.url | contains("desktop-updater")) and (.signature | length > 40))' dist/latest-desktop.json
          jq -e '.platforms | all(.[]; (.url | contains("panoptikon-server")))' dist/latest.json
          for asset in \
            Panoptikon-Desktop-windows-x86_64.exe \
