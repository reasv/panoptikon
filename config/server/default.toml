# Panoptikon server default configuration
# The server loads [cwd]/config/server/default.toml by default.
#
# --------- Environment variable templating ---------
# String values may reference environment variables (populated e.g. via the
# auto-loaded .env file), following the shell/docker-compose conventions:
#
#   api_key = "${MY_API_KEY}"            # hard error if MY_API_KEY is unset
#                                        #   (set-but-empty yields "")
#   level   = "${LOGLEVEL:-INFO}"        # "INFO" when LOGLEVEL is unset OR
#                                        #   set but empty (a "LOGLEVEL="
#                                        #   .env line still gets INFO)
#   opts    = "${EXTRA_OPTS-none}"       # "none" only when unset; empty
#                                        #   stays ""
#   literal = "costs $${notavar}"        # $${ escapes to a literal ${
#
# Substitution runs on parsed string values (backslashes in env values are
# safe) and applies to this file and to every inference registry TOML.
# Numeric/boolean keys can be templated too by quoting the whole value —
# e.g. port = "${PORT:-8080}" — the substituted string is coerced to the
# key's type at load (string keys always keep the string verbatim).

# Root folder for all persistent state (index DBs, user data, thumbnails,
# logs), relative to the working directory unless absolute.
# data_folder = "data"

# Default database names used when neither the request nor the matched
# policy picks one.
# index_db = "default"
# user_data_db = "default"

# Read-only mode: strips write locks and skips startup migrations.
# readonly = false

# Scratch directory for extraction intermediates (video frames, rendered
# pages). Note: the default is literally "data/tmp", not derived from
# data_folder.
# temp_dir = "data/tmp"

[logging]
# Log file path. Default: <data_folder>/panoptikon.log.
# An explicit empty string ("") disables file logging (console only).
# file = ""
# Default log level / tracing filter. The RUST_LOG environment variable
# takes precedence when set (per-module directives supported).
level = "${LOGLEVEL:-INFO}"

# Custom commands for the local /api/open endpoints. {path}, {folder} and
# {filename} expand to the target file's quoted full path, parent directory
# and file name. Unset: platform defaults (start/open/xdg-open, explorer).
# An explicit empty string makes the endpoint a no-op.
# [open]
# file_command = "mpv {path}"
# folder_command = "explorer /select, {path}"

[server]
# Bind address for the gateway listener.
host = "127.0.0.1"
# Port for the gateway listener.
port = 8080
# If true, use X-Forwarded-Host / Forwarded to select policy host.
trust_forwarded_headers = true
# HMAC key for the x-panoptikon-policy tokens the gateway injects on
# UI-bound requests (so SSR API calls inherit the browser request's policy).
# Default: a fresh random key per gateway boot — correct for every
# single-gateway setup. Only configure this (64 hex chars = 32 bytes) in the
# niche multi-gateway case where one gateway's tokens must verify on another.
# policy_token_key = "${POLICY_TOKEN_KEY}"

# Extra named listener endpoints, in addition to the primary host/port above
# (which is always the endpoint named "default"). Every listener serves the
# same routes; the point of extra endpoints is that policies can match on
# them via [policies.match] endpoints = [...]. Endpoint identity comes from
# the TCP listener a connection arrived on — unlike host matching it cannot
# be influenced by request headers, and it works locally (e.g. a second
# loopback port whose policy defaults to a test DB).
# [[server.endpoints]]
# name = "test"        # unique; "default" is reserved for the primary
# port = 8081
# # host = "127.0.0.1" # default: server.host

[upstreams.ui]
# Next.js frontend base URL; with local = true this is also the host/port
# the spawned `next start` binds to. Internal upstream only — never an
# entrypoint: visiting it directly bypasses the gateway (broken images,
# no /api). Users open the gateway port (server.port) instead.
base_url = "http://127.0.0.1:6340"
# Path to the panoptikon-ui checkout the server builds and runs when
# local = true. The standard location is the ui/ git submodule.
# local = true
# dir = "ui"

[upstreams.api]
# API backend base URL. Unused when local = true: every /api route is
# served in-process.
base_url = "http://127.0.0.1:6342"
local = true

# Inference upstreams (first entry is used for search + metadata + the
# /api/inference proxy). Each entry can be excluded from batch jobs with
# `use_for_jobs = false`. With [inference_local] enabled and no entries
# here, the gateway synthesizes a loopback entry pointing at itself.
# [[upstreams.inference]]
# base_url = "http://other-machine:6342"
# weight = 1.0
# use_for_jobs = true

# Serve /api/inference/* in-process (the Rust inferio orchestrator spawns
# Python worker processes on demand; `panoptikon setup` provisions the
# managed Python environment automatically on first start).
[inference_local]
enabled = true

[search]
# Size of the in-process embedding cache used by search preprocessing.
embedding_cache_size = 16

# Host-resource limits and external tools for scan/extraction jobs.
[jobs]
# Explicit paths to bundled native dependencies. Empty means "unset": the
# built-in search order applies (pdfium: exe dir, CWD, system library;
# html_renderer: well-known Edge/Chrome/Chromium paths; thumbnail_font:
# well-known system fonts). The ${VAR:-} templates keep .env-based
# overrides working.
pdfium = "${PDFIUM_PATH:-}"                 # pdfium dynamic library (PDF thumbnails)
html_renderer = "${HTML_RENDERER_PATH:-}"   # Chromium-family browser (HTML thumbnails)
thumbnail_font = "${PANOPTIKON_FONT:-}"     # TTF font for thumbnail text labels
# Other keys (all optional):
# Concurrent extraction input loaders (decode processes and file reads).
# loader_concurrency = 8
# Cap in MiB on loaded-but-unfinished intermediate input data (frames,
# audio, rendered pages) held in memory across in-flight items.
# intermediate_data_budget_mb = 1024
# Per-image decode allocation ceiling in MiB. Image formats are detected by
# content sniffing (mis-named files decode fine), and this ceiling is the
# only guard against decompression bombs — legitimate very large images
# must fit under it. 0 = unlimited.
# image_decode_memory_limit_mb = 8192
# When true, incomplete extraction jobs found at job start are deleted
# (with their data) instead of being marked failed.
# atomic_extraction_jobs = false
# Explicit ffmpeg/ffprobe executables for video and audio processing.
# Default: the managed venv's static-ffmpeg binaries (prefetched by
# `panoptikon setup`), falling back to ffmpeg/ffprobe from PATH.
# ffmpeg = "C:/tools/ffmpeg.exe"
# ffprobe = "C:/tools/ffprobe.exe"

# --------- Rulesets ---------
# Rulesets define which methods + paths are allowed for a policy.
# If a policy references a ruleset, anything not matched is denied.

# Example: allow access to all paths and methods.
[rulesets.allow_all]
allow_all = true

# This still allows bookmarks (safe for public demos).
[rulesets.restricted_demo]
allow = [
    { methods = [
        "GET",
    ], path_prefix = "/docs" },
    { methods = [
        "GET",
    ], path = "/openapi.json" },

    { methods = [
        "GET",
        "POST",
    ], path_prefix = "/api/search/" },
    { methods = [
        "GET",
    ], path_prefix = "/api/items/" },

    { methods = [
        "GET",
        "POST",
        "DELETE",
        "PUT",
    ], path_prefix = "/api/bookmarks/" },

    { methods = [
        "GET",
    ], path = "/api/db" },

    { methods = [
        "GET",
    ], path = "/api/inference/cache" },
]

# --------- Policies ---------
# Policies are checked in order. First match wins.
#
# [policies.match] takes `hosts` (effective Host header) and/or `endpoints`
# (names of the listener endpoints defined under [[server.endpoints]];
# "default" is the primary listener). An empty/omitted list matches
# anything; when both are given, both must match. Endpoint-scoped policies
# should be listed before broad host policies, or the host policy wins.
#
# Example: a policy pinning one endpoint to a dedicated test DB.
#
# [[policies]]
# name = "test_endpoint"
# ruleset = "allow_all"
#
# [policies.match]
# endpoints = ["test"]
#
# [policies.index_db]
# default = "test"
# allow = ["test"]
#
# [policies.user_data_db]
# default = "test"
# allow = ["test"]

[[policies]]
name = "localhost"
ruleset = "allow_all"

[policies.match]
hosts = ["localhost", "127.0.0.1"]

[policies.index_db]
default = "default"
allow = "*"

[policies.user_data_db]
default = "default"
allow = "*"

# Free-form per-policy client settings, returned verbatim by
# GET /api/client-config as the "client" object (alongside capability
# booleans derived from the policy's ruleset). Recognized-by-convention
# keys: search_throttle_ms, disable_backend_open, home_redirect — but
# anything passes through. Default: empty object.
# [policies.client]
# search_throttle_ms = 0

# Example: public demo policy with a restricted ruleset.
#
# [[policies]]
# name = "public_demo"
# ruleset = "restricted_demo"
#
# [policies.match]
# hosts = ["public.example.com"]
#
# [policies.index_db]
# default = "public"
# allow = ["public"]
#
# [policies.user_data_db]
# default = "default"
# allow = ["default"]
#
# [policies.client]
# search_throttle_ms = 1500      # demo visitors get throttled search
# disable_backend_open = true    # hide "open on host" controls entirely
# home_redirect = "/search"      # land visitors on search, not the guide

# Example: multi-tenant policy using a username header.
#
# [[policies]]
# name = "private_multi_tenant"
# ruleset = "allow_all"
#
# [policies.match]
# hosts = ["private.example.com"]
#
# [policies.identity]
# user_header = "X-Forwarded-User"
#
# [policies.index_db]
# default = "default"
# allow = ["default", "shared_images", "shared_docs"]
# tenant_default = "personal_images"
# tenant_prefix_template = "user_{username}_"
#
# [policies.user_data_db]
# default = "default"
# allow = ["default"]
# tenant_default = "personal_bookmarks"
# tenant_prefix_template = "user_{username}_"
