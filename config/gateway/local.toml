# Panoptikon Gateway local rust-only production configuration:
# the gateway serves the API locally, runs the inferio orchestrator
# in-process, and builds + runs the production Next.js UI itself from the
# ui/ submodule checkout.
# Run with: panoptikon --config config/gateway/local.toml

[logging]
# The .env file keeps auto-loading; LOGLEVEL set there (e.g. DEBUG) feeds
# this key via env templating, exactly like the old LOGLEVEL env read did.
# RUST_LOG still takes precedence when set.
level = "${LOGLEVEL:-INFO}"

[server]
# Bind address for the gateway listener.
host = "127.0.0.1"
# Port for the gateway listener. 6342 is the port the Python server used,
# so existing links and clients keep working after the switchover.
port = 6342
# If true, use X-Forwarded-Host / Forwarded to select policy host.
trust_forwarded_headers = true

# Test endpoint: same gateway, same routes, but the "test_endpoint" policy
# below locks it to the "stdtest" DBs. Point coding agents (or a browser
# preview) at http://127.0.0.1:6343 and everything they do defaults to —
# and cannot leave — the stdtest index/user-data DBs, no manual DB
# selection needed. (Missing DBs: POST http://127.0.0.1:6343/api/db/create)
[[server.endpoints]]
name = "test"
port = 6343

[upstreams.ui]
# Next.js frontend base URL; with local = true this is also the host/port
# the spawned `next start` binds to.
base_url = "http://127.0.0.1:6339"
local = true
# Path to the panoptikon-ui checkout. The standard location is the ui/
# git submodule (populated by cloning with --recurse-submodules, or by
# `git submodule update --init`).
dir = "ui"
# If you manage a separate UI checkout yourself, point dir at it instead:
# dir = "../panoptikon-ui"

[upstreams.api]
# API backend base URL. Unused when local = true: every /api route is
# served in-process and unmatched /api paths return 404 (they must not be
# proxied — this base_url points back at the gateway itself).
base_url = "http://127.0.0.1:6342"
local = true

# No [[upstreams.inference]] entries: with [inference_local] enabled the
# gateway synthesizes a loopback entry pointing at itself.

# Serve /api/inference/* in-process (Rust inferio orchestrator).
[inference_local]
enabled = true

[search]
# Size of the in-process embedding cache used by search preprocessing.
embedding_cache_size = 16

# Host-resource limits for scan/extraction jobs (see default.toml for the
# full key list).
# [jobs]
# Per-image decode allocation ceiling in MiB (decompression-bomb guard;
# legitimate very large images must fit under it). 0 = unlimited.
# image_decode_memory_limit_mb = 8192

# --------- Rulesets ---------
# Rulesets define which methods + paths are allowed for a policy.
# If a policy references a ruleset, anything not matched is denied.

# Example: allow access to all paths and methods.
[rulesets.allow_all]
allow_all = true

# This still allows bookmarks (safe for public demos).
[rulesets.restricted_demo]
allow = [
    { methods = [
        "GET",
    ], path_prefix = "/docs" },
    { methods = [
        "GET",
    ], path = "/openapi.json" },

    { methods = [
        "GET",
        "POST",
    ], path_prefix = "/api/search/" },
    { methods = [
        "GET",
    ], path_prefix = "/api/items/" },

    { methods = [
        "GET",
        "POST",
        "DELETE",
        "PUT",
    ], path_prefix = "/api/bookmarks/" },

    { methods = [
        "GET",
    ], path = "/api/db" },

    { methods = [
        "GET",
    ], path = "/api/inference/cache" },
]

# --------- Policies ---------
# Policies are checked in order. First match wins.

# Requests arriving on the "test" endpoint (port 6343) are confined to the
# "stdtest" DBs regardless of Host header. Must come before the localhost
# policy: those requests would match it too, and first match wins.
[[policies]]
name = "test_endpoint"
ruleset = "allow_all"

[policies.match]
endpoints = ["test"]

[policies.index_db]
default = "stdtest"
allow = ["stdtest"]

[policies.user_data_db]
default = "stdtest"
allow = ["stdtest"]

[[policies]]
name = "localhost"
ruleset = "allow_all"

[policies.match]
hosts = ["localhost", "127.0.0.1"]

[policies.index_db]
default = "default"
allow = "*"

[policies.user_data_db]
default = "default"
allow = "*"

# Free-form per-policy client settings, returned verbatim by
# GET /api/client-config as the "client" object (alongside capability
# booleans derived from the policy's ruleset). Recognized-by-convention
# keys: search_throttle_ms, disable_backend_open. Default: empty object.
# [policies.client]
# search_throttle_ms = 0
