[[permission]]
identifier = "allow-control-commands"
description = "Allows the bundled control window to invoke Panoptikon Desktop management commands."
commands.allow = [
  "get_status",
  "get_startup_warnings",
  "open_action_command",
  "open_setup_command",
  "restart_server",
  "set_local_server_enabled",
  "set_start_at_login",
  "open_known_folder",
  "log_tail",
  "relay_status",
  "relay_revoke",
  "relay_set_mappings",
  "choose_relay_folder",
  "file_action_commands",
  "set_file_action_commands",
  "choose_file_action_application",
  "choose_file_action_test_file",
  "test_file_action",
  "get_server_configuration",
  "set_server_configuration",
  "set_relay_enabled",
  "get_update_state",
  "check_for_updates",
  "open_update_window",
  "set_automatic_update_checks",
  "quit_desktop",
]
