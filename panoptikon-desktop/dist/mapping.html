<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map a Relay folder</title>
    <link rel="stylesheet" href="styles.css?v=9" />
    <link rel="stylesheet" href="mapping.css?v=1" />
  </head>
  <body>
    <main class="mapping-shell">
      <header><p class="eyebrow">Panoptikon Desktop</p><h1>Match a server folder</h1></header>
      <p class="intro">The requested file is not covered by an existing mapping. Choose the folder on this computer that corresponds to the server folder.</p>
      <div id="error" role="alert" hidden></div>
      <section id="actions" aria-live="polite"><p class="muted">Loading file action…</p></section>
      <p class="close-help">Closing this window cancels the blocked file action.</p>
    </main>
    <script src="mapping.js?v=1"></script>
  </body>
</html>
